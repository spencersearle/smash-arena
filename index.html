<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Smash Arena — a platform fighter</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="frame">
    <canvas id="game" width="1280" height="720"></canvas>
  </div>
  <p id="hint">
    P1: <b>A/D</b> move · <b>W</b> jump · <b>S</b> fast-fall · <b>F</b> light · <b>G</b> heavy &nbsp;|&nbsp;
    P2: <b>←/→</b> move · <b>↑</b> jump · <b>↓</b> fast-fall · <b>.</b> light · <b>/</b> heavy
    &nbsp;|&nbsp; <b>Enter</b> start/restart
  </p>
  <script src="game.js"></script>
</body>
</html>

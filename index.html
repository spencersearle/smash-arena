<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Smash Arena — a platform fighter</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="frame">
    <canvas id="game" width="1280" height="720"></canvas>
  </div>
  <p id="hint">
    P1: <b>A/D</b> move · <b>W</b> jump · <b>F</b> attack · <b>G</b> special · <b>E</b> shield
    &nbsp;|&nbsp;
    P2: <b>←/→</b> move · <b>↑</b> jump · <b>/</b> attack · <b>.</b> special · <b>,</b> shield
    &nbsp;|&nbsp; <b>Enter</b> select · <b>Esc</b> back/pause
  </p>

  <!-- Load order matters: data defines the namespace everything else hangs off. -->
  <script src="data.js"></script>
  <script src="audio.js"></script>
  <script src="engine.js"></script>
  <script src="ui.js"></script>
  <script src="main.js"></script>
</body>
</html>
